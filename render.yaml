services:
  - type: web
    name: ggc-empire
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 3000

  - type: worker
    name: ggc-discord-bot
    runtime: node
    buildCommand: npm install
    startCommand: node discord-bot.js
    envVars:
      - key: DISCORD_TOKEN
        sync: false
